<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICK.TURN | Creative Studio Admin</title>
    <script src="/libs/supabase.js"></script>
    <script src="/libs/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --bg: #0b0f1a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }

        .container { width: 100%; max-width: 900px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 3rem; border-radius: 32px; }

        header { text-align: center; margin-bottom: 3rem; }
        header h1 span { color: var(--primary); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 0.6rem; font-size: 0.8rem; font-weight: 800; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea { width: 100%; padding: 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 1rem; font-family: inherit; }

        .section { background: rgba(255, 255, 255, 0.02); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); margin-top: 2rem; }
        .entry { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 0.8rem; margin-bottom: 0.8rem; align-items: center; }

        .btn-add { width: 100%; padding: 0.8rem; background: transparent; border: 1px dashed var(--border); color: #94a3b8; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 0.5rem; }
        .btn-remove { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }

        .btn-submit { width: 100%; padding: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 2rem; box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3); }

        .status { margin-top: 2rem; padding: 1.2rem; border-radius: 16px; text-align: center; font-weight: 600; display: none; }
        .success { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); display: block; }
        
        #qrContainer { margin-top: 2.5rem; background: white; padding: 2rem; border-radius: 28px; text-align: center; display: none; color: #0f172a; }
        #qrcode { display: flex; justify-content: center; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CLICK<span>.TURN</span> Admin</h1>
            <p>Create Dynamic Multi-Message Surprises</p>
        </header>
        
        <form id="occasionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>URL ID (Slug)</label>
                    <input type="text" id="slug" placeholder="jiya-24" required>
                </div>
                <div class="form-group">
                    <label>Target Date</label>
                    <input type="datetime-local" id="targetDate" required>
                </div>
                <div class="form-group full-width">
                    <label>Heading Title</label>
                    <input type="text" id="title" placeholder="Happy Birthday, Jiya!" required>
                </div>
                <div class="form-group full-width">
                    <label>Sub-heading</label>
                    <input type="text" id="subtitle" placeholder="Celebrating 24 years...">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Music URL (Direct MP3 Link)</label>
                <div style="display: flex; gap: 10px; margin-bottom: 0.5rem;">
                    <input type="text" id="musicUrl" placeholder="https://example.com/song.mp3" value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
                </div>
                <div style="display: flex; gap: 5px;">
                    <button type="button" class="btn-add" style="padding: 0.4rem 0.8rem; font-size: 0.7rem;" onclick="setMusic('bday')">🎂 Birthday</button>
                    <button type="button" class="btn-add" style="padding: 0.4rem 0.8rem; font-size: 0.7rem;" onclick="setMusic('romantic')">❤️ Romantic</button>
                    <button type="button" class="btn-add" style="padding: 0.4rem 0.8rem; font-size: 0.7rem;" onclick="setMusic('chill')">✨ Chill</button>
                </div>
            </div>

            <!-- WISHES SECTION -->
            <div class="section">
                <label>Message Cards (Wishes)</label>
                <div id="wishesList">
                    <div class="wish-entry" style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                        <textarea class="w-text" rows="2" placeholder="Message content..." required></textarea>
                        <input type="text" class="w-author" placeholder="Author (e.g. Dad)" style="margin-top: 0.5rem; width: 50%;">
                    </div>
                </div>
                <button type="button" class="btn-add" onclick="addWishField()">+ Add Another Message Card</button>
            </div>

            <!-- TIMELINE SECTION -->
            <div class="section">
                <label>Relationship Timeline (Chapters of Us)</label>
                <div id="milestonesList">
                    <div class="wish-entry" style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                        <input type="text" class="m-date" placeholder="Date (e.g. Oct 2022)" style="margin-bottom: 0.5rem;">
                        <input type="text" class="m-title" placeholder="Milestone Title (e.g. First Meeting)" style="margin-bottom: 0.5rem;">
                        <textarea class="m-text" rows="2" placeholder="Brief description..."></textarea>
                    </div>
                </div>
                <button type="button" class="btn-add" onclick="addMilestoneField()">+ Add Milestone Chapter</button>
            </div>

            <!-- PHOTOS SECTION -->
            <div class="section">
                <label>Photo Gallery (Max 10)</label>
                <div id="photoList">
                    <div class="entry">
                        <input type="text" class="p-url" placeholder="Image URL" required>
                        <input type="text" class="p-caption" placeholder="Caption">
                        <div></div>
                    </div>
                </div>
                <button type="button" class="btn-add" onclick="addPhotoField()">+ Add Memory Photo</button>
            </div>

            <div class="form-group" style="margin-top: 2rem;">
                <label>Admin Key</label>
                <input type="password" id="adminKey" required>
            </div>

            <button type="submit" class="btn-submit">Sync & Launch Surprise ✦</button>
        </form>

        <div id="status" class="status"></div>
        <div id="qrContainer">
            <h3>Surprise is Live! ✦</h3>
            <div id="qrcode"></div>
            <div style="background: rgba(0,0,0,0.05); padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; border: 1px dashed var(--border);">
                <p style="font-size: 0.75rem; color: #64748b; margin-bottom: 0.5rem; text-transform: uppercase; font-weight: 800;">Customer Link</p>
                <a id="generatedLink" href="#" target="_blank" style="color: var(--primary); font-weight: 700; font-size: 0.9rem; text-decoration: none; word-break: break-all;"></a>
            </div>
            <button onclick="downloadQR()" style="background: #0b0f1a; color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer;">Download QR</button>
            <button onclick="copyLink()" style="background: var(--primary); color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-left: 0.5rem;">Copy Link</button>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL;
        const SUPABASE_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.addMilestoneField = function() {
            const list = document.getElementById('milestonesList');
            if (list.children.length >= 6) return;
            const div = document.createElement('div');
            div.className = 'wish-entry';
            div.style = "margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; position: relative;";
            div.innerHTML = `
                <input type="text" class="m-date" placeholder="Date" style="margin-bottom: 0.5rem;">
                <input type="text" class="m-title" placeholder="Title" style="margin-bottom: 0.5rem;">
                <textarea class="m-text" rows="2" placeholder="Description"></textarea>
                <button type="button" class="btn-remove" style="position: absolute; right: 0; top: 0;" onclick="this.parentElement.remove()">×</button>
            `;
            list.appendChild(div);
        }

        window.addWishField = function() {
            const div = document.createElement('div');
            div.className = 'wish-entry';
            div.style = "margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; position: relative;";
            div.innerHTML = `
                <textarea class="w-text" rows="2" placeholder="Message content..."></textarea>
                <input type="text" class="w-author" placeholder="Author" style="margin-top: 0.5rem; width: 50%;">
                <button type="button" class="btn-remove" style="position: absolute; right: 0; top: 0;" onclick="this.parentElement.remove()">×</button>
            `;
            document.getElementById('wishesList').appendChild(div);
        }

        window.addPhotoField = function() {
            const list = document.getElementById('photoList');
            if (list.children.length >= 10) return;
            const div = document.createElement('div');
            div.className = 'entry';
            div.innerHTML = `
                <input type="text" class="p-url" placeholder="Image URL">
                <input type="text" class="p-caption" placeholder="Caption">
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
            `;
            list.appendChild(div);
        }

        document.getElementById('occasionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            if (document.getElementById('adminKey').value !== import.meta.env.VITE_ADMIN_KEY) {
                status.innerText = '❌ Access Denied'; status.className = 'status error'; status.style.display = 'block'; return;
            }

            status.style.display = 'block'; status.innerText = 'Syncing...';

            const photos = [];
            document.querySelectorAll('.entry').forEach(e => {
                const url = e.querySelector('.p-url').value;
                if(url) photos.push({ url: url, caption: e.querySelector('.p-caption').value });
            });

            const wishes = [];
            document.querySelectorAll('#wishesList .wish-entry').forEach(e => {
                const text = e.querySelector('.w-text').value;
                if(text) wishes.push({ text: text, author: e.querySelector('.w-author').value || "Anonymous" });
            });

            const timeline = [];
            document.querySelectorAll('#milestonesList .wish-entry').forEach(e => {
                const title = e.querySelector('.m-title').value;
                if(title) {
                    timeline.push({ 
                        date: e.querySelector('.m-date').value, 
                        title: title, 
                        text: e.querySelector('.m-text').value 
                    });
                }
            });

            const data = {
                slug: document.getElementById('slug').value,
                title: document.getElementById('title').value,
                subtitle: document.getElementById('subtitle').value,
                target_date: document.getElementById('targetDate').value,
                music_url: document.getElementById('musicUrl').value,
                wishes: wishes,
                photos: photos,
                timeline: timeline,
                is_test: window.isOrderTest || false
            };

            try {
                const { error } = await supabaseClient.from('occasions').insert([data]);
                if (error) throw error;
                const finalUrl = `https://click-turn-mvp.vercel.app/premium-occasion.html?id=${data.slug}`;
                status.innerText = '✦ Experience Live! ' + finalUrl;
                status.className = 'status success';
                generateQR(finalUrl);
            } catch (err) { status.innerText = 'Error: ' + err.message; status.className = 'status error'; }
        });

        // Real-time Auto-fill from Order
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');

            if (orderId) {
                const status = document.getElementById('status');
                status.style.display = 'block';
                status.innerText = 'Loading customer data...';

                try {
                    const { data, error } = await supabaseClient
                        .from('orders')
                        .select('*')
                        .eq('order_id', orderId)
                        .single();

                    if (error) throw error;

                    if (data) {
                        window.isOrderTest = data.is_test;
                        // Pre-fill main info
                        document.getElementById('title').value = `Happy Birthday, ${data.recipient_name}!`;
                        document.getElementById('subtitle').value = `To the one who makes every day special. ✨`;
                        document.getElementById('slug').value = data.recipient_name.toLowerCase().replace(/\s+/g, '-') + '-' + Math.floor(Math.random() * 900 + 100);
                        if (data.target_date) document.getElementById('targetDate').value = data.target_date;

                        // Clear default fields
                        document.getElementById('wishesList').innerHTML = '';
                        document.getElementById('photoList').innerHTML = '';

                        // Fill Wishes
                        if (data.wishes && data.wishes.length > 0) {
                            data.wishes.forEach(wish => {
                                const div = document.createElement('div');
                                div.className = 'wish-entry';
                                div.style = "margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; position: relative;";
                                div.innerHTML = `
                                    <textarea class="w-text" rows="2" placeholder="Message content..." required>${wish.text || wish}</textarea>
                                    <input type="text" class="w-author" value="${wish.author || data.sender_name || 'Anonymous'}" placeholder="Author" style="margin-top: 0.5rem; width: 50%;">
                                    <button type="button" class="btn-remove" style="position: absolute; right: 0; top: 0;" onclick="this.parentElement.remove()">×</button>
                                `;
                                document.getElementById('wishesList').appendChild(div);
                            });
                        }

                        // Fill Photos
                        if (data.photos && data.photos.length > 0) {
                            data.photos.forEach((url, index) => {
                                const div = document.createElement('div');
                                div.className = 'entry';
                                div.innerHTML = `
                                    <input type="text" class="p-url" value="${url}" placeholder="Image URL" required>
                                    <input type="text" class="p-caption" value="Memory #${index + 1}" placeholder="Caption">
                                    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
                                `;
                                document.getElementById('photoList').appendChild(div);
                            });
                        }

                        status.innerText = '✅ Customer data loaded successfully!';
                        setTimeout(() => status.style.display = 'none', 3000);
                    }
                } catch (err) {
                    status.innerText = 'Failed to load order: ' + err.message;
                    status.className = 'status error';
                }
            }
        });

        function generateQR(url) {
            const qrDiv = document.getElementById('qrcode'); qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: url, width: 220, height: 220 });
            
            const linkEl = document.getElementById('generatedLink');
            linkEl.href = url;
            linkEl.innerText = url;
            
            document.getElementById('qrContainer').style.display = 'block';
        }

        window.downloadQR = function() {
            const img = document.querySelector('#qrcode img');
            const link = document.createElement('a'); link.download = 'qr.png'; link.href = img.src; link.click();
        }

        window.setMusic = function(vibe) {
            const musicInput = document.getElementById('musicUrl');
            const vibes = {
                'bday': 'https://cdn.pixabay.com/audio/2022/11/02/audio_510b64f331.mp3', // Upbeat Birthday
                'romantic': 'https://cdn.pixabay.com/audio/2022/05/27/audio_1808737487.mp3', // Soft Romantic
                'chill': 'https://cdn.pixabay.com/audio/2022/03/15/audio_736657950c.mp3' // Lofi Chill
            };
            musicInput.value = vibes[vibe];
        }

        window.copyLink = function() {
            const url = document.getElementById('generatedLink').href;
            navigator.clipboard.writeText(url);
            alert("Link copied to clipboard!");
        }
    </script>
</body>
</html>
