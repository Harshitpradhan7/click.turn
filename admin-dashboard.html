<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICK.TURN | Admin Dashboard</title>
    <script src="/libs/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --bg: #0b0f1a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; padding: 2rem; min-height: 100vh; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .header h1 span { color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; text-align: center; }
        .stat-card h3 { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-card p { font-size: 2rem; font-weight: 800; color: var(--primary); }

        .order-table-container { background: var(--card); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1.2rem; background: rgba(255, 255, 255, 0.05); font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 1.2rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .status-pill { padding: 0.4rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: rgba(234, 179, 8, 0.1); color: #eab308; }
        .status-paid { background: rgba(34, 197, 94, 0.1); color: #22c55e; }

        .btn-build { background: var(--primary); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 12px; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 0.8rem; display: inline-block; }
        .btn-build:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3); }

        .btn-paid { background: transparent; color: #22c55e; border: 1px solid #22c55e; padding: 0.6rem 1.2rem; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.8rem; margin-right: 0.5rem; transition: 0.3s; }
        .btn-paid:hover { background: rgba(34, 197, 94, 0.1); }

        .loader { text-align: center; padding: 3rem; color: #94a3b8; }
        
        /* Modal for Viewing Order */
        #orderModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
        .modal-content { background: #1e293b; border-radius: 32px; padding: 2rem; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 1.5rem; }
        .close-modal { cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CLICK<span>.TURN</span> Admin Dashboard</h1>
        <div id="authStatus"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>New Orders</h3>
            <p id="countNew">0</p>
        </div>
        <div class="stat-card">
            <h3>Total Revenue</h3>
            <p id="totalRevenue">₹0</p>
        </div>
        <div class="stat-card">
            <h3>Active Surprises</h3>
            <p id="countActive">0</p>
        </div>
    </div>

    <div class="order-table-container">
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer / Recipient</th>
                    <th>Tier</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orderList">
                <!-- Orders will be injected here -->
            </tbody>
        </table>
        <div id="loader" class="loader">Loading orders...</div>
    </div>

    <!-- Modal for Quick View -->
    <div id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Order Details</h2>
                <span class="close-modal" onclick="closeModal()">×</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL;
        const SUPABASE_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchOrders() {
            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            renderOrders(data);
            updateStats(data);
        }

        function renderOrders(orders) {
            const list = document.getElementById('orderList');
            const loader = document.getElementById('loader');
            list.innerHTML = '';
            loader.style.display = 'none';

            if (orders.length === 0) {
                list.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">No orders found yet.</td></tr>';
                return;
            }

            orders.forEach(order => {
                const tr = document.createElement('tr');
                const statusClass = order.status === 'paid' ? 'status-paid' : 'status-pending';
                const date = new Date(order.created_at).toLocaleDateString();
                
                tr.innerHTML = `
                    <td>#${order.order_id.substring(0, 8)}</td>
                    <td>
                        <div style="font-weight: 700;">${order.recipient_name}</div>
                        <div style="font-size: 0.75rem; color: #94a3b8;">by ${order.sender_name || 'Customer'}</div>
                    </td>
                    <td><span style="color: var(--primary); font-weight: 700;">${order.tier.toUpperCase()}</span></td>
                    <td><span class="status-pill ${statusClass}">${order.status}</span></td>
                    <td>${date}</td>
                    <td>
                        ${order.status === 'pending_payment' ? `<button onclick="markAsPaid('${order.order_id}')" class="btn-paid">Mark Paid</button>` : ''}
                        <a href="admin-create.html?orderId=${order.order_id}" class="btn-build">Build Page ✦</a>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        function updateStats(orders) {
            document.getElementById('countNew').innerText = orders.filter(o => o.status === 'pending_payment').length;
            const revenue = orders.filter(o => o.status === 'paid').reduce((acc, o) => acc + (o.tier === 'premium' ? 299 : 199), 0);
            document.getElementById('totalRevenue').innerText = '₹' + revenue;
            
            // To be implemented: count of active surprises from 'occasions' table
            document.getElementById('countActive').innerText = '...';
        }

        // Initial Fetch
        fetchOrders();

        // Mark as Paid Logic
        window.markAsPaid = async function(orderId) {
            if(confirm("Did you verify the payment screenshot on WhatsApp?")) {
                const { error } = await supabaseClient
                    .from('orders')
                    .update({ status: 'paid' })
                    .eq('order_id', orderId);
                
                if(error) alert("Error updating status: " + error.message);
                else fetchOrders(); // refresh list
            }
        };

        // Realtime Updates
        const ordersSubscription = supabaseClient
            .channel('orders-db-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, payload => {
                fetchOrders();
            })
            .subscribe();

    </script>
</body>
</html>
